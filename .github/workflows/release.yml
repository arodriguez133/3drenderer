name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Build
        run: cd src && gcc -Wall -std=c99 *.c -lSDL2 -o renderer-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: renderer-linux
          path: src/renderer-linux-x86_64

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2

      - name: Build
        run: cd src && gcc -Wall -std=c99 *.c -lSDL2 -o renderer-windows-x86_64.exe

      # Bundle SDL2.dll so users don't need to install it
      - name: Copy SDL2.dll
        run: cp /mingw64/bin/SDL2.dll src/SDL2.dll

      - uses: actions/upload-artifact@v4
        with:
          name: renderer-windows
          path: |
            src/renderer-windows-x86_64.exe
            src/SDL2.dll

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Build
        run: |
          SDL2_PREFIX=$(brew --prefix sdl2)
          cd src && gcc -Wall -std=c99 *.c -I"$SDL2_PREFIX/include" -L"$SDL2_PREFIX/lib" -lSDL2 -o renderer-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: renderer-macos
          path: src/renderer-macos-arm64

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Windows build
        run: |
          cd artifacts/renderer-windows
          zip ../renderer-windows-x86_64.zip renderer-windows-x86_64.exe SDL2.dll

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/renderer-linux/renderer-linux-x86_64
            artifacts/renderer-windows-x86_64.zip
            artifacts/renderer-macos/renderer-macos-arm64
